services:
  web:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "file:./data/db/healthme.db"
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "qwen2.5vl:7b"
      APP_TZ: "${APP_TZ:-America/New_York}"
    volumes:
      - ./data:/app/data
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-models:
